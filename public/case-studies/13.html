<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile UX Wireflow</title>
<style>
  :root{
    --bg:#eef1f5;--paper:#f8fafc;--ink:#475569;--ink2:#64748b;--mut:#94a3b8;
    --stroke:#c3cdda;--fill:#dde4ec;--accent:#5b7aa8;--accent-soft:#e3ebf5;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);
    background:#e9edf2;overflow-x:hidden}
  .stage{width:min(100vw,1600px);aspect-ratio:16/9;min-height:720px;position:relative;overflow:hidden;
    background:var(--bg);border:1px solid #d7dee7;box-shadow:0 35px 90px rgba(40,55,80,.14)}
  .stage::before{content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(120,140,170,.18) 1.2px,transparent 1.2px);background-size:26px 26px;opacity:.7}
  .head{position:absolute;left:32px;top:26px;z-index:5}
  .head h1{margin:0;font-size:22px;letter-spacing:-.03em;color:#334155}
  .head p{margin:5px 0 0;font-size:12px;color:var(--ink2)}
  .legend{position:absolute;right:32px;top:28px;display:flex;gap:16px;font-size:11px;color:var(--ink2);z-index:5}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .legend i{width:11px;height:11px;border-radius:3px;background:var(--fill);border:1px solid var(--stroke)}
  .legend i.dec{border-radius:2px;transform:rotate(45deg);background:var(--accent-soft);border-color:var(--accent)}
  /* board */
  .board{position:absolute;inset:96px 30px 28px;z-index:3}
  svg.flow{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
  .flow path{fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:6 7;animation:march 16s linear infinite}
  @keyframes march{to{stroke-dashoffset:-300}}
  .flow .head-tri{fill:var(--accent)}
  .screen{position:absolute;width:168px;background:var(--paper);border:1.5px solid var(--stroke);border-radius:20px;
    box-shadow:0 14px 30px rgba(40,55,80,.1);padding:12px 11px;animation:rise .6s ease both}
  .screen:nth-child(2){animation-delay:.1s}.screen:nth-child(3){animation-delay:.2s}.screen:nth-child(4){animation-delay:.3s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .notch{width:46px;height:5px;border-radius:999px;background:var(--stroke);margin:1px auto 11px}
  .slabel{position:absolute;top:-11px;left:12px;background:var(--accent);color:#fff;font-size:10px;font-weight:750;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
  .ph{height:10px;border-radius:5px;background:var(--fill);margin-bottom:8px}
  .ph.t{width:62%;height:13px;background:#cdd6e1}
  .ph.s{width:40%}
  .img{height:54px;border-radius:9px;background:repeating-linear-gradient(45deg,#e2e8f0 0 7px,#d7dee7 7px 14px);display:grid;place-items:center;color:var(--mut);margin-bottom:9px}
  .img svg{opacity:.6}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
  .cell{height:36px;border-radius:8px;background:var(--fill)}
  .field{height:30px;border-radius:8px;border:1.5px dashed var(--stroke);background:#fff;margin-bottom:8px}
  .btn{height:32px;border-radius:9px;background:var(--accent);opacity:.85}
  .btn.ghost{background:#fff;border:1.5px solid var(--stroke)}
  .listrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #e8edf3}
  .listrow i{width:26px;height:26px;border-radius:7px;background:var(--fill);flex:0 0 auto}
  .listrow .lc{flex:1;display:flex;flex-direction:column;gap:5px}
  .nav{display:flex;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid #e8edf3}
  .nav i{width:22px;height:7px;border-radius:4px;background:var(--fill)}
  /* decision diamond */
  .decision{position:absolute;width:118px;height:118px;background:var(--accent-soft);border:2px solid var(--accent);
    transform:rotate(45deg);border-radius:14px;display:grid;place-items:center;box-shadow:0 12px 26px rgba(91,122,168,.2);animation:rise .6s ease .25s both}
  .decision .txt{transform:rotate(-45deg);text-align:center;font-size:11px;font-weight:700;color:#3f5878;line-height:1.3}
  .branch-lbl{position:absolute;font-size:10px;font-weight:750;color:var(--accent);background:#fff;border:1px solid var(--accent-soft);border-radius:999px;padding:3px 8px;z-index:4}
  /* positions */
  .s1{left:8px;top:26px}
  .s2{left:228px;top:10px}
  .dec{left:470px;top:78px}
  .s3{left:660px;top:-6px}
  .s4{left:660px;top:236px}
</style>
<style>
  *,*::before,*::after{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
  .screen,.decision{animation-iteration-count:1!important}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
<style id="cs-dark-theme">
  /* Dark variant — follows the embedding page theme (set via the observer
     script below). Low-fidelity wireframe: dark canvas, light translucent
     strokes/fills, readable labels, single accent preserved (brightened). */
  html[data-theme="dark"]{
    --bg:#0d111a;--paper:#151b27;--ink:#c4cfe2;--ink2:#97a3ba;--mut:#6f7c92;
    --stroke:rgba(255,255,255,.2);--fill:rgba(255,255,255,.08);
    --accent:#7da4e0;--accent-soft:rgba(125,164,224,.16);
  }
  html[data-theme="dark"] body{background:#0a0d14}
  html[data-theme="dark"] .stage{border-color:rgba(255,255,255,.08);box-shadow:0 35px 90px rgba(0,0,0,.5)}
  html[data-theme="dark"] .stage::before{background-image:radial-gradient(rgba(255,255,255,.1) 1.2px,transparent 1.2px)}
  html[data-theme="dark"] .head h1{color:var(--ink)}
  html[data-theme="dark"] .ph.t{background:rgba(255,255,255,.16)}
  html[data-theme="dark"] .img{background:repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0 7px,rgba(255,255,255,.09) 7px 14px)}
  html[data-theme="dark"] .field,
  html[data-theme="dark"] .btn.ghost,
  html[data-theme="dark"] .branch-lbl{background:var(--paper)}
  html[data-theme="dark"] .listrow{border-bottom-color:rgba(255,255,255,.08)}
  html[data-theme="dark"] .nav{border-top-color:rgba(255,255,255,.08)}
  html[data-theme="dark"] .decision .txt{color:var(--ink)}
</style>
<script>
  /* Follow the embedding page's theme. The iframe is same-origin, so it reads
     and observes <html data-theme> on the parent (set by the site's no-flash
     script before paint, so there is no wrong-theme flash). Falls back to the
     OS preference, then light, and also accepts a postMessage channel. */
  (function () {
    var root = document.documentElement;
    function apply(t) { root.setAttribute("data-theme", t === "dark" ? "dark" : "light"); }
    var pe = null;
    try { if (window.parent && window.parent !== window) pe = window.parent.document.documentElement; } catch (e) { pe = null; }
    var initial = pe && pe.getAttribute("data-theme");
    if (initial !== "dark" && initial !== "light") {
      initial = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    apply(initial);
    if (pe && "MutationObserver" in window) {
      try {
        new MutationObserver(function () { apply(pe.getAttribute("data-theme")); })
          .observe(pe, { attributes: true, attributeFilter: ["data-theme"] });
      } catch (e) {}
    }
    window.addEventListener("message", function (e) {
      if (e && e.data && e.data.type === "cs-theme") apply(e.data.theme);
    });
  })();
</script>
</head>
<body>
<main class="stage" aria-label="Mobile UX wireframe and wireflow board mockup">
  <div class="head"><h1>Mobile Wireflow</h1><p>Low-fidelity screens, decisions, and the path between them.</p></div>
  <div class="legend">
    <span><i></i>Screen</span>
    <span><i class="dec"></i>Decision</span>
    <span><svg width="20" height="8"><path d="M0 4 H16" stroke="#5b7aa8" stroke-width="2" stroke-dasharray="4 4"/></svg>Flow</span>
  </div>

  <div class="board">
    <svg class="flow" viewBox="0 0 880 420" preserveAspectRatio="none" aria-hidden="true">
      <path d="M186 130 C210 130, 214 100, 236 100"/>
      <path d="M406 110 C440 110, 452 130, 478 138"/>
      <path d="M600 120 C636 100, 648 70, 668 60"/>
      <path d="M600 168 C636 220, 648 250, 668 280"/>
      <polygon class="head-tri" points="232,94 244,100 232,106"/>
      <polygon class="head-tri" points="474,132 486,138 474,144"/>
      <polygon class="head-tri" points="664,56 676,60 666,68"/>
      <polygon class="head-tri" points="664,276 676,280 666,288"/>
    </svg>

    <span class="branch-lbl" style="left:612px;top:30px">if valid</span>
    <span class="branch-lbl" style="left:600px;top:248px">if empty</span>

    <!-- screen 1 -->
    <section class="screen s1"><span class="slabel">1 · Browse</span><div class="notch"></div>
      <div class="ph t"></div><div class="ph s"></div>
      <div class="grid2"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
      <div class="nav"><i></i><i></i><i></i><i></i></div>
    </section>

    <!-- screen 2 -->
    <section class="screen s2"><span class="slabel">2 · Detail</span><div class="notch"></div>
      <div class="img"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 16 5-5 4 4 3-3 6 6"/></svg></div>
      <div class="ph t"></div><div class="ph s"></div>
      <div class="btn"></div>
    </section>

    <!-- decision -->
    <div class="decision dec"><div class="txt">Signed in?</div></div>

    <!-- screen 3 -->
    <section class="screen s3"><span class="slabel">3 · Checkout</span><div class="notch"></div>
      <div class="ph t"></div>
      <div class="field"></div><div class="field"></div>
      <div class="btn"></div>
    </section>

    <!-- screen 4 -->
    <section class="screen s4"><span class="slabel">4 · Sign up</span><div class="notch"></div>
      <div class="listrow"><i></i><div class="lc"><span class="ph s" style="margin:0;width:80%"></span><span class="ph s" style="margin:0;width:50%"></span></div></div>
      <div class="field"></div>
      <div class="btn ghost"></div><div style="height:7px"></div><div class="btn"></div>
    </section>
  </div>
</main>
</body>
</html>
