<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local Service Website + Booking</title>
<style>
  :root{
    --bg:#edf7f1;--surface:#fff;--border:#d7eee1;--line:#e9f5ef;
    --text:#12241b;--muted:#6c8a7c;
    --green:#0f9d6e;--green2:#0c7a55;--green-soft:#e4f7ef;--green-bd:#bce8d5;--amber:#f59e0b;--ink:#12241b;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--text);
    background:radial-gradient(circle at 20% 100%,rgba(15,157,110,.10),transparent 32%),var(--bg);overflow-x:hidden}
  .stage{width:min(100vw,1600px);aspect-ratio:16/9;min-height:720px;position:relative;overflow:hidden;
    background:linear-gradient(180deg,#f7fdfa,#edf7f1);border:1px solid var(--border);box-shadow:0 35px 90px rgba(10,60,40,.13);
    display:flex;align-items:center}
  /* desktop service site */
  .browser{position:absolute;left:42px;top:64px;bottom:64px;width:58%;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 26px 60px rgba(10,60,40,.12);overflow:hidden;display:flex;flex-direction:column}
  .bbar{height:34px;background:#eef8f2;display:flex;align-items:center;gap:7px;padding:0 13px;border-bottom:1px solid var(--line)}
  .bbar i{width:9px;height:9px;border-radius:50%;background:#bfe2d2}
  .bbar .url{flex:1;height:18px;border-radius:8px;background:#fff;margin-left:9px;display:flex;align-items:center;padding:0 10px;font-size:9px;color:#7a988a;gap:6px}
  .site{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .nav{height:46px;display:flex;align-items:center;padding:0 22px;gap:13px;border-bottom:1px solid var(--line)}
  .nav .lg{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#0f9d6e,#0c7a55);display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
  .nav .nm{font-size:13px;font-weight:820;letter-spacing:-.02em}
  .nav .links{margin-left:auto;display:flex;gap:16px;font-size:10.5px;color:#6c8a7c;font-weight:600}
  .nav .call{height:30px;border-radius:9px;background:var(--green);color:#fff;font-size:10px;font-weight:740;display:flex;align-items:center;gap:7px;padding:0 13px}
  .hero{padding:26px 24px;display:grid;grid-template-columns:1fr .9fr;gap:18px;align-items:center;background:linear-gradient(135deg,#e4f7ef,#fff)}
  .hero .ht{font-size:27px;line-height:1.06;letter-spacing:-.04em;font-weight:840}
  .hero .ht em{font-style:normal;color:var(--green)}
  .hero .hs{height:8px;width:80%;border-radius:5px;background:#bce8d5;margin:11px 0}
  .hero .hs.s{width:60%}
  .hero .hb{height:36px;width:140px;border-radius:11px;background:linear-gradient(135deg,#0f9d6e,#0c7a55);margin-top:13px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:740}
  .hero .himg{height:130px;border-radius:14px;background:linear-gradient(135deg,#0f9d6e,#34d399);position:relative;overflow:hidden}
  .hero .himg::after{content:"";position:absolute;right:-20px;bottom:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.2)}
  .services{padding:0 24px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  .svc{border:1px solid var(--line);border-radius:12px;padding:13px;display:flex;flex-direction:column;gap:8px}
  .svc .si{width:30px;height:30px;border-radius:9px;background:var(--green-soft);display:grid;place-items:center;color:var(--green2)}
  .svc .sl{height:7px;border-radius:4px;background:#e4f0ea}
  .svc .sl.s{width:58%}
  .trust{margin:0 24px 22px;background:#f6fbf9;border:1px solid var(--line);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:16px}
  .trust .rev{display:flex;flex-direction:column;gap:5px}
  .trust .stars{color:#f0b429;font-size:12px;letter-spacing:1px}
  .trust .rl{height:6px;width:120px;border-radius:4px;background:#dcebe4}
  .trust .badge{margin-left:auto;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;color:var(--muted);font-weight:600}
  .trust .badge b{font-size:18px;font-weight:840;color:var(--green2)}
  /* phone booking */
  .phone{position:absolute;right:60px;top:50%;transform:translateY(-50%);width:268px;height:540px;border-radius:38px;background:#fff;
    border:8px solid #06150f;box-shadow:0 40px 80px rgba(10,60,40,.4);padding:0;overflow:hidden;z-index:6;
    animation:rise .7s cubic-bezier(.2,.9,.2,1) .15s both;display:flex;flex-direction:column}
  @keyframes rise{from{opacity:0;transform:translateY(calc(-50% + 30px))}to{opacity:1;transform:translateY(-50%)}}
  .p-top{background:linear-gradient(135deg,#0f9d6e,#0c7a55);color:#fff;padding:26px 20px 18px}
  .p-top .step{font-size:10px;opacity:.85;font-weight:600}
  .p-top h3{margin:6px 0 0;font-size:18px;letter-spacing:-.03em}
  .p-body{flex:1;padding:18px 18px 0;display:flex;flex-direction:column}
  .cal-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:740;margin-bottom:12px}
  .cal-h .ar{width:24px;height:24px;border-radius:7px;background:#f0f7f3;display:grid;place-items:center;color:#0c7a55}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
  .cal .d{aspect-ratio:1;border-radius:9px;display:grid;place-items:center;font-size:11px;font-weight:650;color:#3a5347;background:#f4f9f6}
  .cal .d.mut{color:#b9cdc3;background:transparent}
  .cal .d.on{background:linear-gradient(135deg,#0f9d6e,#0c7a55);color:#fff;font-weight:800}
  .cal .dh{font-size:8px;color:#9bb3a8;text-align:center;font-weight:700}
  .slots-h{font-size:11px;font-weight:740;margin-bottom:9px}
  .slots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .slot{height:34px;border-radius:9px;border:1px solid var(--green-bd);background:#fff;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#0c7a55}
  .slot.on{background:linear-gradient(135deg,#0f9d6e,#0c7a55);color:#fff;border-color:transparent}
  .slot.off{color:#b9cdc3;border-color:#e4efe9;background:#f7faf8}
  .sticky{margin-top:auto;background:#fff;border-top:1px solid var(--line);padding:13px 0;display:flex;gap:10px}
  .sticky .call2{flex:1;height:44px;border-radius:13px;border:1.5px solid var(--green-bd);color:#0c7a55;font-size:12px;font-weight:740;display:flex;align-items:center;justify-content:center;gap:8px}
  .sticky .book{flex:1.3;height:44px;border-radius:13px;background:linear-gradient(135deg,#0f9d6e,#0c7a55);color:#fff;font-size:12px;font-weight:780;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 12px 24px rgba(15,157,110,.3)}
</style>
<style>
  *,*::before,*::after{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
  .phone{animation-iteration-count:1!important}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="stage" aria-label="Local service website with booking path mockup">
  <!-- desktop site -->
  <div class="browser">
    <div class="bbar"><i></i><i></i><i></i><span class="url"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>greenleaf-care.com</span></div>
    <div class="site">
      <div class="nav"><span class="lg">G</span><span class="nm">GreenLeaf</span><div class="links"><span>Services</span><span>About</span><span>Reviews</span></div><span class="call"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.5-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2z"/></svg>Call</span></div>
      <div class="hero">
        <div><div class="ht">Trusted lawn &amp; garden <em>care.</em></div><div class="hs"></div><div class="hs s"></div><div class="hb">Book a visit</div></div>
        <div class="himg"></div>
      </div>
      <div class="services">
        <div class="svc"><div class="si"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22c5-3 8-7 8-12a8 8 0 0 0-16 0c0 5 3 9 8 12z"/></svg></div><div class="sl"></div><div class="sl s"></div></div>
        <div class="svc"><div class="si"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M12 3v18"/></svg></div><div class="sl"></div><div class="sl s"></div></div>
        <div class="svc"><div class="si"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="m9 12 2 2 4-4"/></svg></div><div class="sl"></div><div class="sl s"></div></div>
      </div>
      <div class="trust">
        <div class="rev"><span class="stars">★★★★★</span><span class="rl"></span></div>
        <div class="badge"><b>4.9</b>320 reviews</div>
        <div class="badge"><b>12y</b>local</div>
      </div>
    </div>
  </div>

  <!-- phone booking -->
  <section class="phone">
    <div class="p-top"><div class="step">Step 2 of 3</div><h3>Pick a time</h3></div>
    <div class="p-body">
      <div class="cal-h"><span class="ar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg></span>June 2026<span class="ar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18l6-6-6-6"/></svg></span></div>
      <div class="cal">
        <span class="dh">M</span><span class="dh">T</span><span class="dh">W</span><span class="dh">T</span><span class="dh">F</span><span class="dh">S</span><span class="dh">S</span>
        <span class="d mut">26</span><span class="d mut">27</span><span class="d">1</span><span class="d">2</span><span class="d">3</span><span class="d">4</span><span class="d">5</span>
        <span class="d">8</span><span class="d">9</span><span class="d on">10</span><span class="d">11</span><span class="d">12</span><span class="d">13</span><span class="d">14</span>
      </div>
      <div class="slots-h">Available · Wed Jun 10</div>
      <div class="slots">
        <span class="slot off">9:00</span><span class="slot">10:30</span><span class="slot on">1:00</span>
        <span class="slot">2:30</span><span class="slot">4:00</span><span class="slot off">5:30</span>
      </div>
      <div class="sticky">
        <span class="call2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.5-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2z"/></svg>Call</span>
        <span class="book">Confirm 1:00 →</span>
      </div>
    </div>
  </section>
</main>
</body>
</html>
