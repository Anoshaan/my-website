<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design-to-Development Handoff</title>
<style>
  :root{
    --bg:#eef1f5;--canvas:#f6f8fb;--panel:#fff;--border:#dfe4ea;--line:#eef1f5;
    --text:#1f2733;--muted:#7c8696;
    --red:#ef4444;--redline:#f43f6e;--blue:#3b82f6;--blue-soft:#eef4ff;--green:#16a34a;--slate:#64748b;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--text);background:#e6eaef;overflow-x:hidden}
  .stage{width:min(100vw,1600px);aspect-ratio:16/9;min-height:720px;position:relative;overflow:hidden;
    background:var(--bg);border:1px solid var(--border);box-shadow:0 35px 90px rgba(30,40,60,.14);
    display:grid;grid-template-columns:1fr 300px}
  .toolbar{grid-column:1/-1;height:46px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;grid-row:1}
  .stage{grid-template-rows:46px 1fr}
  .tl{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:740}
  .tl .ic{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800}
  .tl .mode{font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-soft);padding:5px 11px;border-radius:7px;margin-left:6px}
  .bps{display:flex;gap:7px}
  .bp{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:650;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 11px}
  .bp.on{color:var(--blue);border-color:#cfe0ff;background:var(--blue-soft)}
  /* canvas with redlines */
  .canvas{position:relative;background:radial-gradient(circle at 1px 1px,#dde3ea 1px,transparent 0);background-size:20px 20px;padding:40px 56px;overflow:hidden}
  .spec-frame{position:relative;width:100%;height:100%;max-width:560px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 18px 44px rgba(30,40,60,.12);padding:26px;
    display:flex;flex-direction:column;gap:16px}
  .sf-label{position:absolute;top:-22px;left:0;font-size:11px;font-weight:700;color:var(--blue)}
  .nav-spec{height:50px;border-radius:11px;background:linear-gradient(135deg,#1f2733,#3a4452);display:flex;align-items:center;padding:0 16px;gap:13px}
  .nav-spec .logo{width:26px;height:26px;border-radius:8px;background:#3b82f6}
  .nav-spec .nl{height:7px;width:46px;border-radius:4px;background:rgba(255,255,255,.4)}
  .nav-spec .sp{margin-left:auto;display:flex;gap:18px}
  .hero-spec{border-radius:11px;background:linear-gradient(135deg,#eef4ff,#dbeafe);padding:20px;display:flex;flex-direction:column;gap:10px}
  .hs-t{height:16px;width:62%;border-radius:6px;background:#9cb8e8}
  .hs-s{height:9px;width:44%;border-radius:5px;background:#bcd0f0}
  .hs-btn{height:34px;width:120px;border-radius:9px;background:#3b82f6;margin-top:4px}
  .cards-spec{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .cs{height:78px;border-radius:10px;border:1px solid var(--line);background:#fafbfc;padding:11px;display:flex;flex-direction:column;gap:7px}
  .cs .ci{height:26px;border-radius:7px;background:#e3e9f1}
  .cs .cl{height:6px;border-radius:4px;background:#e8edf3}
  .cs .cl.s{width:55%}
  /* redline measurement annotations */
  .rl{position:absolute;display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;color:var(--redline);z-index:4}
  .rl .line{background:var(--redline);position:relative}
  .rl.v .line{width:1px;height:var(--len)}
  .rl.h .line{height:1px;width:var(--len)}
  .rl .tag{background:#fff;border:1px solid #fbcad7;border-radius:5px;padding:2px 5px;box-shadow:0 3px 8px rgba(244,63,110,.15)}
  .dot-h{position:absolute;width:8px;height:8px;border:1.5px solid var(--blue);border-radius:50%;background:#fff;z-index:5}
  .dot-h::after{content:"";position:absolute;inset:2px;border-radius:50%;background:var(--blue);animation:ping 2.4s ease-in-out infinite}
  @keyframes ping{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.4}}
  /* inspector panel */
  .insp{background:#fff;border-left:1px solid var(--border);padding:18px 17px;overflow:hidden;display:flex;flex-direction:column;gap:15px}
  .insp h3{margin:0;font-size:13px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .insp h3 .d{width:9px;height:9px;border-radius:3px;background:var(--blue)}
  .specrow{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#4a5563;padding:8px 0;border-bottom:1px solid var(--line)}
  .specrow b{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--text)}
  .specrow .sw{width:16px;height:16px;border-radius:5px;vertical-align:middle;display:inline-block;margin-right:7px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .grp-h{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:#aab2c0;font-weight:760}
  .notes{background:#fffaf0;border:1px solid #fde8c4;border-radius:11px;padding:12px}
  .notes .nh{font-size:10px;font-weight:760;color:#b45309;letter-spacing:.04em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .note{display:flex;gap:9px;font-size:11px;color:#7a5a2a;line-height:1.45;padding:6px 0}
  .note i{width:16px;height:16px;border-radius:5px;background:#fde8c4;color:#b45309;display:grid;place-items:center;font-size:9px;font-weight:800;flex:0 0 auto}
  .codebox{background:#0f1623;border-radius:10px;padding:11px 12px;font-family:ui-monospace,Menlo,monospace;font-size:10px;line-height:1.6;color:#9fb0cc;margin-top:auto}
  .codebox .k{color:#7dd3fc}.codebox .v{color:#86efac}
</style>
<style>
  *,*::before,*::after{backdrop-filter:none!important;-webkit-backdrop-filter:none!important}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
<style id="cs-dark-theme">
  /* Dark variant — follows the embedding page theme (set via the observer
     script below). Intentional dark surfaces, not an inversion: muted
     borders, reduced white, readable text, accent colours (redline / blue)
     preserved. The code box (.codebox) is already dark by design. */
  html[data-theme="dark"]{
    --bg:#0d111a;--canvas:#11161f;--panel:#151b27;--border:rgba(255,255,255,0.09);--line:rgba(255,255,255,0.06);
    --text:#e7ecf6;--muted:#97a3ba;
    --red:#f87171;--redline:#fb6a90;--blue:#4b8bff;--blue-soft:rgba(75,139,255,0.16);--green:#34d399;--slate:#94a3b8;
  }
  html[data-theme="dark"] body{background:#0a0d14}
  html[data-theme="dark"] .stage{box-shadow:0 35px 90px rgba(0,0,0,0.5)}
  html[data-theme="dark"] .toolbar{background:var(--panel)}
  html[data-theme="dark"] .tl .mode{color:var(--blue);background:var(--blue-soft)}
  html[data-theme="dark"] .bp.on{color:var(--blue);background:var(--blue-soft);border-color:rgba(75,139,255,0.4)}
  html[data-theme="dark"] .canvas{background:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.06) 1px,transparent 0)}
  html[data-theme="dark"] .spec-frame{background:var(--panel);box-shadow:0 18px 45px rgba(0,0,0,0.5)}
  html[data-theme="dark"] .cs{background:#1b2230;border-color:var(--line)}
  html[data-theme="dark"] .cs .ci{background:rgba(255,255,255,0.1)}
  html[data-theme="dark"] .cs .cl{background:rgba(255,255,255,0.07)}
  html[data-theme="dark"] .rl .tag{background:#1b2230;border-color:rgba(251,106,144,0.45);color:var(--redline)}
  html[data-theme="dark"] .dot-h{background:#1b2230}
  html[data-theme="dark"] .insp{background:var(--panel)}
  html[data-theme="dark"] .specrow{color:#97a3ba}
  html[data-theme="dark"] .grp-h{color:#6f7c92}
  html[data-theme="dark"] .notes{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.22)}
  html[data-theme="dark"] .notes .nh{color:#fbbf24}
  html[data-theme="dark"] .note{color:#d8c39a}
  html[data-theme="dark"] .note i{background:rgba(251,191,36,0.2);color:#fbbf24}
  html[data-theme="dark"] .specrow .sw{box-shadow:inset 0 0 0 1px rgba(255,255,255,0.1)}
</style>
<script>
  /* Follow the embedding page's theme. The iframe is same-origin, so it reads
     and observes <html data-theme> on the parent (set by the site's no-flash
     script before paint, so there is no wrong-theme flash). Falls back to the
     OS preference, then light, and also accepts a postMessage channel. */
  (function () {
    var root = document.documentElement;
    function apply(t) { root.setAttribute("data-theme", t === "dark" ? "dark" : "light"); }
    var pe = null;
    try { if (window.parent && window.parent !== window) pe = window.parent.document.documentElement; } catch (e) { pe = null; }
    var initial = pe && pe.getAttribute("data-theme");
    if (initial !== "dark" && initial !== "light") {
      initial = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    apply(initial);
    if (pe && "MutationObserver" in window) {
      try {
        new MutationObserver(function () { apply(pe.getAttribute("data-theme")); })
          .observe(pe, { attributes: true, attributeFilter: ["data-theme"] });
      } catch (e) {}
    }
    window.addEventListener("message", function (e) {
      if (e && e.data && e.data.type === "cs-theme") apply(e.data.theme);
    });
  })();
</script>
</head>
<body>
<main class="stage" aria-label="Design to development handoff redline spec mockup">
  <header class="toolbar">
    <div class="tl"><span class="ic">⌘</span>Hero / Desktop<span class="mode">Inspect</span></div>
    <div class="bps">
      <span class="bp on"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="4" width="20" height="14" rx="2"/></svg>1440</span>
      <span class="bp"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="3" width="14" height="18" rx="2"/></svg>768</span>
      <span class="bp"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="7" y="2" width="10" height="20" rx="2"/></svg>375</span>
    </div>
  </header>

  <section class="canvas">
    <div class="spec-frame">
      <span class="sf-label">Hero — Desktop · 1440</span>

      <!-- top gap redline -->
      <div class="rl v" style="left:-30px;top:26px;flex-direction:column;--len:50px"><span class="tag">48</span><span class="line"></span></div>

      <div class="nav-spec">
        <span class="logo"></span><span class="nl"></span>
        <div class="sp"><span class="nl" style="width:30px"></span><span class="nl" style="width:30px"></span><span class="nl" style="width:30px"></span></div>
      </div>

      <!-- gap redline -->
      <div class="rl v" style="left:-30px;top:92px;flex-direction:column;--len:16px"><span class="tag">16</span><span class="line"></span></div>

      <div class="hero-spec">
        <span class="dot-h" style="left:46px;top:130px"></span>
        <div class="hs-t"></div><div class="hs-s"></div><div class="hs-btn"></div>
        <!-- button width redline -->
        <div class="rl h" style="left:20px;top:188px;--len:120px"><span class="line"></span><span class="tag">120 × 34</span></div>
      </div>

      <div class="cards-spec">
        <div class="cs"><div class="ci"></div><div class="cl"></div><div class="cl s"></div></div>
        <div class="cs"><div class="ci"></div><div class="cl"></div><div class="cl s"></div></div>
        <div class="cs"><div class="ci"></div><div class="cl"></div><div class="cl s"></div></div>
        <!-- column gap redline -->
        <div class="rl h" style="left:31%;top:-13px;--len:14px"><span class="tag">14</span></div>
      </div>
    </div>
  </section>

  <aside class="insp">
    <h3><span class="d"></span>Hero section</h3>
    <div>
      <div class="grp-h" style="margin-bottom:8px">Layout</div>
      <div class="specrow"><span>Padding</span><b>48 32</b></div>
      <div class="specrow"><span>Gap</span><b>16</b></div>
      <div class="specrow"><span>Grid</span><b>3 × 14</b></div>
      <div class="specrow"><span>Radius</span><b>11</b></div>
    </div>
    <div>
      <div class="grp-h" style="margin-bottom:8px">Tokens</div>
      <div class="specrow"><span><span class="sw" style="background:#3b82f6"></span>Fill</span><b>brand/500</b></div>
      <div class="specrow"><span>Heading</span><b>display/lg</b></div>
    </div>
    <div class="notes">
      <div class="nh"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>Dev notes</div>
      <div class="note"><i>R</i>Cards stack to 1 col below 768.</div>
      <div class="note"><i>!</i>Button keeps 44px min tap target.</div>
    </div>
    <div class="codebox"><span class="k">.hero</span> {<br/>&nbsp;&nbsp;<span class="k">padding</span>:<span class="v"> 48px 32px</span>;<br/>&nbsp;&nbsp;<span class="k">gap</span>:<span class="v"> 16px</span>;<br/>}</div>
  </aside>
</main>
</body>
</html>
