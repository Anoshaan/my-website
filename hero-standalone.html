<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hero Standalone — Motion Rebuild V3</title>
  
  <!-- Premium Fonts Setup -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" />

  <!-- GSAP & SplitType CDN Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/split-type"></script>

  <style>
    /* =========================================================
       DESIGN SYSTEM TOKENS (V3 Rebuilt)
       ========================================================= */
    :root {
      --bg: #050505;
      --text: #ecebe6;
      --muted: rgba(176, 179, 190, 0.9);
      --accent: #cfd9ff;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* =========================================================
       HERO COMPONENT
       ========================================================= */
    .hero-container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px;
      overflow: hidden;
      background: transparent;
      z-index: 1;
    }

    /* Interactive Background Glow Parallax Layers */
    .hero-glow-radial {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.015) 0%, transparent 60%);
      pointer-events: none;
      z-index: -2;
      transform: translate3d(0, 0, 0);
    }

    .hero-glow-layered {
      position: absolute;
      top: 40%;
      left: 50%;
      width: 850px;
      height: 400px;
      background: linear-gradient(to top right, rgba(255, 255, 255, 0.05), transparent);
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      z-index: -1;
      transform: translate(-50%, -50%) translate3d(0, 0, 0);
    }

    /* Layout Wrapper */
    .hero-content {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      user-select: none;
    }

    /* Typography & Hierarchy */
    .hero-headline {
      font-size: clamp(38px, 6.8vw, 92px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.035em;
      color: #ffffff;
      margin-bottom: 24px;
      max-w: 22ch;
      text-wrap: balance;
    }

    .hero-headline em {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.01em;
      background: linear-gradient(180deg, #ffffff 0%, color-mix(in oklab, var(--accent) 60%, #ffffff) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      font-size: clamp(15px, 1.25vw, 19px);
      font-weight: 300;
      color: var(--muted);
      max-width: 48ch;
      line-height: 1.6;
      margin-bottom: 48px;
      text-wrap: balance;
    }

    /* Magnetic Buttons */
    .hero-cta-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
      flex-wrap: wrap;
    }

    .magnetic-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      isolation: isolate;
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      will-change: transform;
    }

    /* Primary White CTA Button */
    .btn-primary {
      background: #ffffff;
      color: #000000;
      border: none;
    }

    /* Rainbow Shadow Aura Effect */
    .rainbow-shadow::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 9999px;
      background: linear-gradient(90deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ffb400, #ff007f);
      background-size: 400% 400%;
      z-index: -2;
      opacity: 0.55;
      filter: blur(14px);
      animation: rainbow-shadow-anim 8s linear infinite;
      transition: all 0.4s var(--ease-out-expo);
    }

    .rainbow-shadow::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: white;
      z-index: -1;
    }

    .rainbow-shadow:hover::before {
      inset: -6px;
      filter: blur(22px);
      opacity: 0.8;
    }

    @keyframes rainbow-shadow-anim {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Secondary Border CTA Button */
    .btn-secondary {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-arrow {
      display: inline-flex;
      align-items: center;
      will-change: transform;
    }

    /* SplitText Utilities */
    .inline-block {
      display: inline-block;
    }

    @media (max-width: 600px) {
      .hero-cta-group {
        flex-direction: column;
        width: 100%;
        padding: 0 16px;
      }
      .magnetic-btn {
        width: 100%;
      }
      .hero-container {
        padding: 80px 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Interactive Canvas (Link your grid-standalone.js to draw grid here) -->
  <canvas id="glow-grid-canvas" style="position: fixed; inset: 0; z-index: -3; width: 100vw; height: 100vh; background: #050505;"></canvas>

  <!-- ================== HERO CONTAINER ================== -->
  <section class="hero-container">
    <!-- Ambient kinetic glow layers behind content (Parallax affected) -->
    <div class="hero-glow-radial"></div>
    <div class="hero-glow-layered"></div>

    <div class="hero-content">
      <!-- Title featuring Geist font and Instrument Serif highlights -->
      <h1 class="hero-headline">
        Designing interfaces with clarity, <em>motion</em>, and intent.
      </h1>

      <!-- Supporting Sub-text -->
      <p class="hero-sub">
        Building thoughtful digital experiences that feel clear, responsive, and emotionally precise.
      </p>

      <!-- CTA triggers with custom magnetic interactions -->
      <div class="hero-cta-group">
        <a href="labs.html" class="magnetic-btn btn-primary rainbow-shadow">
          View Labs
          <span class="btn-arrow">
            <svg viewBox="0 0 14 14" width="12" height="12"><path d="M3 11L11 3M11 3H5M11 3V9" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>
        <a href="systems.html" class="magnetic-btn btn-secondary">
          Explore Systems
        </a>
      </div>
    </div>
  </section>

  <!-- ================== MOTION ENGINE ================== -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. SPLIT-TEXT CHAR ENTRANCE TIMELINE
      // Uses SplitType to cleanly parse headline characters and words
      const headlineSplit = new SplitType(".hero-headline", {
        types: "chars,words",
        charClass: "inline-block"
      });

      const customEase = "cubic-bezier(0.16, 1, 0.3, 1)";
      const tl = gsap.timeline({ defaults: { ease: customEase } });

      // Animate characters (Fade in + slide up + smooth blur transition)
      tl.fromTo(
        headlineSplit.chars,
        { opacity: 0, y: 35, filter: "blur(6px)" },
        {
          opacity: 1,
          y: 0,
          filter: "blur(0px)",
          stagger: 0.015,
          duration: 1.2
        }
      )
      // Animate supporting subtext
      .fromTo(
        ".hero-sub",
        { opacity: 0, y: 20, filter: "blur(4px)" },
        { opacity: 1, y: 0, filter: "blur(0px)", duration: 1.0 },
        "-=0.8" // Overlaps with headline animation
      )
      // Animate CTA buttons
      .fromTo(
        ".hero-cta-group",
        { opacity: 0, y: 15 },
        { opacity: 1, y: 0, duration: 0.8 },
        "-=0.6"
      );

      // 2. KINETIC PARALLAX GLOW TRIGGERS
      // Translates background radial glow and diagonal glow layers subtly based on cursor positioning
      const handlePointerMove = (e) => {
        const { clientX, clientY } = e;
        const xOffset = (clientX / window.innerWidth - 0.5) * 40;
        const yOffset = (clientY / window.innerHeight - 0.5) * 40;

        // Soft, slower parallax shift on the layered background
        gsap.to(".hero-glow-radial", {
          x: xOffset * 0.7,
          y: yOffset * 0.7,
          duration: 1.5,
          ease: "power2.out"
        });

        // Opposite, larger parallax drift on layered gradient block
        gsap.to(".hero-glow-layered", {
          x: -xOffset * 1.1,
          y: -yOffset * 1.1,
          duration: 2.2,
          ease: "power2.out"
        });
      };

      window.addEventListener("pointermove", handlePointerMove, { passive: true });

      // 3. TACTILE MAGNETIC CTA BUTTON INTERACTIONS
      // Leverages custom vector mouse calculations to pull parent buttons and inner arrows dynamically
      const magneticBtns = document.querySelectorAll(".magnetic-btn");
      
      magneticBtns.forEach((btn) => {
        const handleBtnMove = (e) => {
          const rect = btn.getBoundingClientRect();
          // Calculate center anchor coordinate of button
          const btnX = rect.left + rect.width / 2;
          const btnY = rect.top + rect.height / 2;
          const dx = e.clientX - btnX;
          const dy = e.clientY - btnY;

          // Pull factor scale on button frame
          gsap.to(btn, {
            x: dx * 0.35,
            y: dy * 0.35,
            scale: 1.03,
            duration: 0.35,
            ease: "power2.out"
          });

          // Layered perspective depth: translate inner arrow slightly faster/slower
          const arrow = btn.querySelector(".btn-arrow");
          if (arrow) {
            gsap.to(arrow, {
              x: dx * 0.15,
              y: dy * 0.15,
              duration: 0.35,
              ease: "power2.out"
            });
          }
        };

        const handleBtnLeave = () => {
          // Snap button container back with custom bouncy spring release
          gsap.to(btn, {
            x: 0,
            y: 0,
            scale: 1,
            duration: 0.7,
            ease: "elastic.out(1.1, 0.4)"
          });

          // Snap inner arrow back
          const arrow = btn.querySelector(".btn-arrow");
          if (arrow) {
            gsap.to(arrow, {
              x: 0,
              y: 0,
              duration: 0.7,
              ease: "elastic.out(1.1, 0.4)"
          });
          }
        };

        btn.addEventListener("mousemove", handleBtnMove);
        btn.addEventListener("mouseleave", handleBtnLeave);
      });
    });
  </script>

  <!-- Optional Grid Script Hook (Just uncomment to run Glow Grid directly!) -->
  <!-- <script src="grid-standalone.js"></script> -->

</body>
</html>
